services:
  - type: web
    name: hospital-token-system
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: UV_LINK_MODE
        value: "copy"
      - key: BUILD_COMMAND
        value: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    dockerContext: .
    dockerfilePath: ./Dockerfile

databases:
  - name: hospital-db
    plan: free
    region: singapore
