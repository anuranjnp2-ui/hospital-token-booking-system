services:
  - type: web
    name: hospital-token-system
    runtime: python
    buildCommand: "bash scripts/build.sh"
    startCommand: "cd backend && python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: UV_LINK_MODE
        value: "copy"
    dockerContext: .
    dockerfilePath: ./Dockerfile

databases:
  - name: hospital-db
    plan: free
    region: singapore
