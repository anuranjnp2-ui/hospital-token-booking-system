services:
  - type: web
    name: hospital-token-system
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: PORT
        value: 10000
    dockerContext: .
    dockerfilePath: ./Dockerfile

databases:
  - name: hospital-db
    plan: free
    region: singapore
